name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Type-check
        run: npx tsc -p . --noEmit

      - name: Tests
        run: npm test

      - name: Verify tag matches package.json
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG="${{ github.ref_name || github.event.inputs.tag }}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Build VSIX
        run: |
          npm run compile
          npx --yes @vscode/vsce package --allow-missing-repository --no-dependencies

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          name: ${{ github.ref_name || github.event.inputs.tag }}
          generate_release_notes: true
          files: "*.vsix"
